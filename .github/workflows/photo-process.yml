name: photo-process

# Owner photos land in assets/menu/ by a DIRECT push to main (ADR-0003 / the
# owner guide): the repo is public, so camera EXIF/GPS must not stay there, and
# raw jpg/HEIC bloat the page. This job strips metadata and converts each newly
# pushed photo to a clean webp, rewrites any data/menu.json reference to match,
# and commits the result back.
#
# Trigger asymmetry (verified repeatedly in this project): a human/owner push
# to main fires `on: push`; a GITHUB_TOKEN bot push fires NO workflow. So the
# commit this job makes cannot re-trigger the job — the anti-loop backbone.
# Belt-and-suspenders: the processor skips files that are already clean webp
# (webp AND no EXIF), so even a re-run would be a no-op.
#
# Scope: only the photo paths ACTUALLY changed by this push are processed, so
# the job never rewrites unrelated existing assets.

on:
  push:
    branches: [main]
    paths:
      - "assets/menu/**"

# Commit the cleaned photo back; nothing else is needed.
permissions:
  contents: write
  statuses: write

concurrency:
  group: photo-process
  cancel-in-progress: false

jobs:
  strip-and-convert:
    runs-on: ubuntu-latest
    # A merge/rebase by the bot would carry the marker below; skip our own
    # commits as a second guard against loops.
    if: "!contains(github.event.head_commit.message, '[photo-process]')"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need the previous commit to diff the pushed paths

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Pillow (webp) and pillow-heif (iPhone HEIC)
        run: python3 -m pip install --quiet Pillow pillow-heif

      - name: Process only the photos this push added or changed
        id: proc
        run: |
          # Photos changed by this push (added/copied/modified/renamed), still
          # present in the tree, under assets/menu/.
          before='${{ github.event.before }}'
          if ! git cat-file -e "$before^{commit}" 2>/dev/null; then
            before=HEAD~1
          fi
          git diff --name-only --diff-filter=ACMR "$before" HEAD -- 'assets/menu/**' \
            > "$RUNNER_TEMP/changed.txt" || true
          echo "changed photo paths:"; cat "$RUNNER_TEMP/changed.txt"
          # Keep only files that still exist (a delete leaves no file).
          : > "$RUNNER_TEMP/targets.txt"
          while IFS= read -r p; do
            [ -n "$p" ] && [ -f "$p" ] && printf '%s\n' "$p" >> "$RUNNER_TEMP/targets.txt"
          done < "$RUNNER_TEMP/changed.txt"
          if [ ! -s "$RUNNER_TEMP/targets.txt" ]; then
            echo "no photo files to process"
            echo "did_work=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # photo_process is per-file resilient (B2): a broken image is
          # skipped with a warning, valid photos beside it still convert.
          mapfile -t files < "$RUNNER_TEMP/targets.txt"
          python3 tools/photo_process.py "${files[@]}"
          # Keep index.html / app.min.js consistent if a menu.json ref changed.
          python3 build.py
          if [ -n "$(git status --porcelain)" ]; then
            echo "did_work=true" >> "$GITHUB_OUTPUT"
          else
            echo "did_work=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit the cleaned photos back
        if: steps.proc.outputs.did_work == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage ONLY the menu photos and generated files; never add everything,
          # which swept workspace temp (changed.txt/targets.txt) into main (B3).
          git add assets/menu data/menu.json index.html app.js app.min.js
          if git diff --cached --quiet; then
            echo "nothing staged; skipping commit"
            exit 0
          fi
          git commit -m "chore: strip EXIF and convert menu photos to webp [photo-process]"
          sha=$(git rev-parse HEAD)

          # main is protected by the required `check` + `guard` contexts, and a
          # GITHUB_TOKEN push triggers no CI to satisfy them. So, like smoke.yml
          # and push-watchdog.yml, this TRUSTED job stages the commit on a temp
          # branch (branches are unprotected), injects both required statuses on
          # its own sha — `check` reflects a real build.py --check here, `guard`
          # is success by construction (a photo-only cleanup) — and then
          # fast-forwards main to that sha via the refs API.
          tmp="photo-process/$GITHUB_RUN_ID"
          git push origin "HEAD:refs/heads/$tmp"

          if python3 build.py --check; then
            check_state=success
            check_desc="build.py --check passed on the cleaned photos"
          else
            check_state=failure
            check_desc="build.py --check FAILED after photo processing"
          fi
          gh api -X POST "repos/$REPO/statuses/$sha" \
            -f state="$check_state" -f context=check -f description="$check_desc"
          gh api -X POST "repos/$REPO/statuses/$sha" \
            -f state=success -f context=guard \
            -f description="photo cleanup by the trusted photo-process workflow"

          # Fast-forward main to the cleaned commit (its parent is the pushed
          # head, so this is a strict fast-forward the protection allows once
          # the required statuses are green).
          if [ "$check_state" = "success" ]; then
            gh api -X PATCH "repos/$REPO/git/refs/heads/main" -f sha="$sha" \
              && echo "main fast-forwarded to cleaned photos $sha"
          else
            echo "cleaned tree failed --check; leaving main untouched"
          fi
          git push origin --delete "$tmp" || true
