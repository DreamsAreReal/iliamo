name: smoke

# Post-deploy smoke: after Cloudflare Pages finishes deploying main, verify
# that the production index.html matches main byte-for-byte (a bare HTTP 200
# proves nothing — the project answers 200 on any path).
#
# Triggers (all facts verified live on 2026-07-15):
#   * check_run "Cloudflare Pages" — CF reports every deploy as a check run
#     (it creates NO deployment events, see F1). Works for pushes made by a
#     human/admin (~30 s latency) but NOT for pushes made by GITHUB_TOKEN:
#     after auto-merge of PR #12 the CF check run completed and no workflow
#     started — the check suite inherits the GITHUB_TOKEN actor, so the
#     golden path (auto-merged PRs) would go unchecked.
#   * schedule (cron "*/5", but OBSERVED ticks are sparse and irregular —
#     1.5–2.5 hours apart, M3-R1) — a background safety net, NOT a
#     guarantee; deterministic coverage comes from the explicit dispatch in
#     automerge.yml and push-watchdog.yml. Overlapping runs are harmless
#     (a smoke pass is idempotent, revert PRs are deduplicated).
#   * workflow_dispatch — manual runs and failure-path testing: expect_sha256
#     replaces the reference hash with a deliberately wrong one WITHOUT
#     touching production. Inputs are only a hint: before alarming the owner
#     the run re-verifies production against the REAL main, so an injected
#     dispatch can never create a revert PR (M3-R1).
#
# On failure the workflow PREPARES a revert PR (branch revert/*, excluded
# from automerge) — the rollback happens only when the owner (or Codex on
# the owner's phrase) confirms the merge. Deduplication is keyed by the bad
# commit sha; a stale open revert PR is closed automatically so it cannot
# silence the rollback of a newer breakage.
# GITHUB_TOKEN trap: pushes/PRs made with GITHUB_TOKEN trigger no workflows,
# so the required "check" context would hang "expected" forever on the
# revert PR. The smoke run therefore executes `python3 build.py --check` on
# the revert branch itself and posts the resulting commit status
# (context "check") via the API — that is what branch protection reads.

on:
  check_run:
    types: [completed]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      expect_sha256:
        description: "Override expected index.html sha256 (failure-path test)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event.check_run.name == 'Cloudflare Pages' &&
       github.event.check_run.conclusion == 'success' &&
       github.event.check_run.check_suite.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PROD_URL: https://www.iliamo.bar
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compare production with main
        id: smoke
        run: |
          extra=""
          if [ -n "${{ github.event.inputs.expect_sha256 }}" ]; then
            extra="--expect-sha256 ${{ github.event.inputs.expect_sha256 }}"
            echo "FAILURE-PATH TEST: using injected expected sha256"
          fi
          if python3 tools/smoke_check.py --url "$PROD_URL" $extra; then
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$extra" ]; then
            # Inputs are only a hint (M3-R1): re-verify against the REAL
            # reference before alarming the owner. An injected mismatch that
            # reality does not confirm must never create a revert PR.
            if python3 tools/smoke_check.py --url "$PROD_URL"; then
              echo "INJECTED failure not confirmed by reality — no revert PR"
              echo "healthy=true" >> "$GITHUB_OUTPUT"
            else
              echo "healthy=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare a revert PR (owner confirms it — never auto-merged)
        if: steps.smoke.outputs.healthy == 'false'
        run: |
          bad_sha=$(git rev-parse HEAD)
          short_sha=$(git rev-parse --short HEAD)

          # Deduplication key = the bad commit sha (M3-R1): an open revert PR
          # for the SAME sha -> skip; a stale one (different sha) is closed
          # so it cannot silence the rollback of a newer breakage.
          gh pr list --repo "$REPO" --state open \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("revert/")) | "\(.number) \(.headRefName)"' \
            > open_reverts.txt || true
          while read -r pr_number head_ref; do
            [ -n "$pr_number" ] || continue
            case "$head_ref" in
              "revert/$short_sha-"*)
                echo "revert PR #$pr_number for $short_sha already open, not duplicating"
                exit 0
                ;;
              *)
                echo "closing stale revert PR #$pr_number ($head_ref)"
                gh pr comment "$pr_number" --repo "$REPO" \
                  --body "Ситуация изменилась: на сайте более новое изменение, и этот откат устарел. Закрываю его и готовлю новый."
                gh pr close "$pr_number" --repo "$REPO" --delete-branch \
                  || gh pr close "$pr_number" --repo "$REPO"
                ;;
            esac
          done < open_reverts.txt

          branch="revert/$short_sha-$GITHUB_RUN_ID"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git revert --no-edit "$bad_sha"

          # Validate the reverted tree; the result feeds the injected status.
          if python3 build.py --check; then
            state=success
            description="build.py --check passed (status injected by smoke: GITHUB_TOKEN pushes trigger no CI)"
          else
            state=failure
            description="build.py --check FAILED on the revert branch — do not merge as is"
          fi

          git push origin "$branch"
          # GITHUB_TOKEN pushes trigger no workflows, so BOTH required
          # contexts are injected here: `check` reflects the local
          # build.py --check result; `guard` is success by construction —
          # this branch is a pure revert created by the trusted smoke.
          gh api -X POST "repos/$REPO/statuses/$(git rev-parse HEAD)" \
            -f state="$state" -f context=check -f description="$description"
          gh api -X POST "repos/$REPO/statuses/$(git rev-parse HEAD)" \
            -f state=success -f context=guard \
            -f description="revert branch created by the trusted smoke workflow"

          # Owner-facing texts are Russian by design.
          {
            printf '%s\n\n' "## Отчёт"
            printf '%s\n\n' "Проверка после публикации не прошла: сайт на проде не совпал с тем, что лежит в репозитории (коммит $bad_sha). Этот PR откатывает последнюю публикацию."
            printf '%s\n' "Автоматической публикации отката не будет — его подтверждает владелец."
          } > pr-body.md
          pr_url=$(gh pr create --repo "$REPO" --head "$branch" --base main \
            --title "revert: roll back $short_sha (production smoke failed)" \
            --body-file pr-body.md)
          gh pr comment "$pr_url" --repo "$REPO" --body "Сайт не совпал с меню в репозитории, я подготовил откат последней публикации. Проверка отката: $state. Чтобы вернуть сайт к прежнему виду — подтвердите этот PR (кнопка Merge) или напишите Codex: «верни как было»."
          echo "revert PR: $pr_url"

      - name: Fail the run when production is broken
        if: steps.smoke.outputs.healthy == 'false'
        run: exit 1
