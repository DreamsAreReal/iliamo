name: smoke

# Post-deploy smoke: after Cloudflare Pages finishes deploying main, verify
# that production serves exactly what main holds (byte-for-byte index.html;
# a bare HTTP 200 proves nothing — the project answers 200 on any path).
#
# Triggers (all facts verified live on 2026-07-15):
#   * check_run "Cloudflare Pages" — CF reports every deploy as a check run
#     (it creates NO deployment events, see F1). Works for pushes made by a
#     human/admin (~30 s latency) but NOT for pushes made by GITHUB_TOKEN:
#     after auto-merge of PR #12 the CF check run completed and no workflow
#     started — the check suite inherits the GITHUB_TOKEN actor, so the
#     golden path (auto-merged PRs) would go unchecked.
#   * schedule (cron, every 5 min) — the guaranteed net that covers
#     auto-merged deploys; a smoke pass is idempotent, so overlap with
#     check_run runs is harmless (revert PRs are deduplicated).
#   * workflow_dispatch — manual runs and failure-path testing: expect_sha256
#     replaces the reference hash with a deliberately wrong one WITHOUT
#     touching production.
#
# On failure the workflow prepares a revert PR (branch revert/*, excluded
# from automerge — the owner or Codex confirms it) with a Russian comment.
# GITHUB_TOKEN trap: pushes/PRs made with GITHUB_TOKEN trigger no workflows,
# so the required "check" context would hang "expected" forever on the
# revert PR. The smoke run therefore executes `python3 build.py --check` on
# the revert branch itself and posts the resulting commit status
# (context "check") via the API — that is what branch protection reads.

on:
  check_run:
    types: [completed]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      expect_sha256:
        description: "Override expected index.html sha256 (failure-path test)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event.check_run.name == 'Cloudflare Pages' &&
       github.event.check_run.conclusion == 'success' &&
       github.event.check_run.check_suite.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PROD_URL: https://www.iliamo.bar
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compare production with main
        id: smoke
        run: |
          extra=""
          if [ -n "${{ github.event.inputs.expect_sha256 }}" ]; then
            extra="--expect-sha256 ${{ github.event.inputs.expect_sha256 }}"
            echo "FAILURE-PATH TEST: using injected expected sha256"
          fi
          if python3 tools/smoke_check.py --url "$PROD_URL" $extra; then
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare a revert PR (owner confirms it — never auto-merged)
        if: steps.smoke.outputs.healthy == 'false'
        run: |
          # One open revert PR at a time: do not pile up duplicates.
          open_reverts=$(gh pr list --repo "$REPO" --state open \
            --json headRefName --jq '[.[] | select(.headRefName | startswith("revert/"))] | length')
          if [ "$open_reverts" -gt 0 ]; then
            echo "an open revert PR already exists, not creating another"
            exit 0
          fi

          bad_sha=$(git rev-parse HEAD)
          short_sha=$(git rev-parse --short HEAD)
          branch="revert/$short_sha-$GITHUB_RUN_ID"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git revert --no-edit "$bad_sha"

          # Validate the reverted tree; the result feeds the injected status.
          if python3 build.py --check; then
            state=success
            description="build.py --check passed (status injected by smoke: GITHUB_TOKEN pushes trigger no CI)"
          else
            state=failure
            description="build.py --check FAILED on the revert branch — do not merge as is"
          fi

          git push origin "$branch"
          gh api -X POST "repos/$REPO/statuses/$(git rev-parse HEAD)" \
            -f state="$state" -f context=check -f description="$description"

          # Owner-facing texts are Russian by design.
          {
            printf '%s\n\n' "## Отчёт"
            printf '%s\n\n' "Проверка после публикации не прошла: сайт на проде не совпал с тем, что лежит в репозитории (коммит $bad_sha). Этот PR откатывает последнюю публикацию."
            printf '%s\n' "Автоматической публикации отката не будет — его подтверждает владелец."
          } > pr-body.md
          pr_url=$(gh pr create --repo "$REPO" --head "$branch" --base main \
            --title "revert: roll back $short_sha (production smoke failed)" \
            --body-file pr-body.md)
          gh pr comment "$pr_url" --repo "$REPO" --body "Сайт не совпал с меню в репозитории, я подготовил откат последней публикации. Проверка отката: $state. Чтобы вернуть сайт к прежнему виду — подтвердите этот PR (кнопка Merge) или напишите Codex: «верни как было»."
          echo "revert PR: $pr_url"

      - name: Fail the run when production is broken
        if: steps.smoke.outputs.healthy == 'false'
        run: exit 1
