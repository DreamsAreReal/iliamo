name: automerge

# Zero-tap delivery, structural revision (ADR-0001 variant C; M2-R2 fixes).
#
# This workflow is the TRUSTED judge of every pull request. It runs on
# `pull_request_target`, so GitHub always executes the YAML and the guard
# code FROM THE BASE BRANCH (main): a pull request cannot replace the guard
# that judges it, no matter what it puts into .github/** or tools/.
#
# SECURITY INVARIANT for pull_request_target: NEVER check out or execute
# pull-request content here. The PR side is read as pure data via the API
# and `git show` (tools/pr_guard.py). Do not add `actions/checkout` with the
# head ref and do not run scripts taken from the head commit.
#
# The verdict is posted as a commit status with context `guard` on the exact
# head SHA. `guard` is a REQUIRED status in branch protection, which kills
# the TOCTOU race: a new commit means a new SHA with no guard status, so
# GitHub physically cannot merge (even with auto-merge armed) until this
# workflow re-evaluates the new head. On a blocking verdict the workflow
# additionally disarms auto-merge and leaves one Russian owner comment.
#
# Verdict matrix (context `guard` on the head SHA):
#   * any PR touching .github/**            -> failure (workflow self-edit;
#     a PR that fakes its own `check` via a modified build-check.yml gains
#     nothing: `guard` from the trusted base still blocks the merge);
#   * auto-merge candidate (same-repo branch codex/* or label `automerge`,
#     not revert/*, not draft):
#       - every changed path inside the content allowlist AND generated
#         files changed only in the generated way -> success + arm
#         auto-merge + dispatch post-merge smoke;
#       - anything else -> failure + disarm auto-merge + owner comment;
#   * every other PR (owner branches, reverts, forks) -> success with a
#     "manual decision" note: merging those is a human call, protected by
#     the required `check` and by the absence of armed auto-merge.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, ready_for_review]

# The default GITHUB_TOKEN of this repository is read-only; the write scopes
# below are granted explicitly ONLY to this trusted base-branch workflow.
permissions:
  contents: write        # arm auto-merge
  pull-requests: write   # owner comments, disarm auto-merge
  statuses: write        # the required `guard` commit status
  actions: write         # dispatch the post-merge smoke workflow

jobs:
  # NB: the job must NOT be named "guard" — its pending check run would share
  # the name with the required `guard` commit status and deadlock the merge
  # against the job's own wait-for-merge loop (found live on PR #18).
  automerge:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      # Trusted code only: the base branch as of the event.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Evaluate the PR against the auto-merge policy
        id: verdict
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'automerge') }}
        run: |
          # The head commit is fetched as DATA for git show; never executed.
          git fetch --quiet origin "$HEAD_SHA"

          candidate=false
          if [ "$HEAD_REPO" = "$REPO" ] && [ "$IS_DRAFT" != "true" ] \
             && { case "$HEAD_REF" in codex/*) true;; *) [ "$HAS_LABEL" = "true" ];; esac; } \
             && { case "$HEAD_REF" in revert/*) false;; *) true;; esac; }; then
            candidate=true
          fi

          gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate \
            --jq '.[] | [.filename, .previous_filename // empty] | .[]' \
            > changed.txt
          echo "changed paths:"; cat changed.txt

          workflows_touched=false
          allowed=true
          blocked=""
          while IFS= read -r path; do
            case "$path" in
              .github/*) workflows_touched=true; allowed=false; blocked="$blocked, $path" ;;
              data/menu.json|index.html|app.js|app.min.js|styles.min.css|assets/menu/*) ;;
              *) allowed=false; blocked="$blocked, $path" ;;
            esac
          done < changed.txt

          gen_clean=true
          details=""
          if [ "$allowed" = "true" ]; then
            # PR body is needed for the report==diff rule (G8): every changed
            # menu item name must be mentioned in the Russian report.
            gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq .body > body.txt
            status=0
            python3 tools/pr_guard.py --base "$BASE_SHA" --head "$HEAD_SHA" \
              --body-file body.txt > guard.txt || status=$?
            cat guard.txt
            if [ "$status" -ne 0 ]; then
              gen_clean=false
              details=$(grep '^PR GUARD VIOLATION' guard.txt | sed 's/^PR GUARD VIOLATION: //' | paste -sd ';' - || true)
            fi
          fi

          clean=false
          [ "$allowed" = "true" ] && [ "$gen_clean" = "true" ] && clean=true

          {
            echo "candidate=$candidate"
            echo "clean=$clean"
            echo "workflows_touched=$workflows_touched"
            echo "blocked=${blocked#, }"
            echo "details=$details"
          } >> "$GITHUB_OUTPUT"

      - name: Post the required `guard` status on this exact head SHA
        env:
          CANDIDATE: ${{ steps.verdict.outputs.candidate }}
          CLEAN: ${{ steps.verdict.outputs.clean }}
          WORKFLOWS: ${{ steps.verdict.outputs.workflows_touched }}
          BLOCKED: ${{ steps.verdict.outputs.blocked }}
          DETAILS: ${{ steps.verdict.outputs.details }}
        run: |
          if [ "$WORKFLOWS" = "true" ]; then
            state=failure
            description="workflow files changed — admin review required"
          elif [ "$CANDIDATE" != "true" ]; then
            state=success
            description="not an auto-merge candidate; merging is a human decision"
          elif [ "$CLEAN" = "true" ]; then
            state=success
            description="content-only change, eligible for auto-merge"
          else
            state=failure
            description="outside the auto-merge policy: ${BLOCKED:-$DETAILS}"
          fi
          # Commit status descriptions are capped at 140 characters.
          gh api -X POST "repos/$REPO/statuses/$HEAD_SHA" \
            -f state="$state" -f context=guard \
            -f description="$(printf '%s' "$description" | cut -c1-140)"
          echo "guard=$state ($description)"

      - name: Arm auto-merge (GitHub merges after required checks pass)
        if: >-
          steps.verdict.outputs.candidate == 'true' &&
          steps.verdict.outputs.clean == 'true'
        run: gh pr merge --auto --squash "$PR_NUMBER" --repo "$REPO"

      - name: Disarm auto-merge on a blocking verdict (TOCTOU defence in depth)
        if: >-
          steps.verdict.outputs.candidate == 'true' &&
          steps.verdict.outputs.clean != 'true'
        run: |
          gh pr merge --disable-auto "$PR_NUMBER" --repo "$REPO" \
            && echo "auto-merge disarmed" \
            || echo "auto-merge was not armed"

      - name: Ask the owner to confirm (single comment, never repeated)
        if: >-
          steps.verdict.outputs.candidate == 'true' &&
          steps.verdict.outputs.clean != 'true'
        env:
          BLOCKED: ${{ steps.verdict.outputs.blocked }}
          DETAILS: ${{ steps.verdict.outputs.details }}
        run: |
          marker="<!-- automerge: waiting for owner -->"
          if gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
               --jq '.[].body' | grep -qF "$marker"; then
            echo "owner-confirmation comment already exists, not repeating it"
            exit 0
          fi
          if [ -n "$BLOCKED" ]; then
            reason="изменение выходит за меню ($BLOCKED)"
          else
            reason="изменение затрагивает код или каркас сайта, а не только меню ($DETAILS)"
          fi
          # The comment itself is Russian: it is addressed to the bar owner.
          printf '%s\n%s\n' \
            "$marker" \
            "Жду подтверждения владельца: $reason. Автоматическая публикация отключена — такие изменения владелец подтверждает сам." \
            | gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file -

      - name: Dispatch the post-deploy smoke once the PR merges
        if: >-
          steps.verdict.outputs.candidate == 'true' &&
          steps.verdict.outputs.clean == 'true'
        # A merge push made by GITHUB_TOKEN emits no workflow-triggering
        # events (verified live on PR #12), but workflow_dispatch is the
        # documented exception: it does create runs even from GITHUB_TOKEN.
        # The wait covers slow runner queues (up to 10 minutes); if the PR
        # still has not merged by then, the smoke is dispatched anyway — it
        # is idempotent and green on a healthy production. The 5-minute cron
        # (first live tick verified 2026-07-15 20:17Z) is the safety net.
        run: |
          for _ in $(seq 1 120); do
            state=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq .state)
            if [ "$state" = "MERGED" ]; then
              gh workflow run smoke.yml --repo "$REPO"
              echo "post-merge smoke dispatched"
              exit 0
            fi
            if [ "$state" = "CLOSED" ]; then
              echo "PR closed without merge, no smoke needed"
              exit 0
            fi
            sleep 5
          done
          gh workflow run smoke.yml --repo "$REPO"
          echo "PR not merged within 10 minutes; smoke dispatched anyway (idempotent)"
